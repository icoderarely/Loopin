services:
  db:
    image: postgres:16
    container_name: postgres-db
    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
